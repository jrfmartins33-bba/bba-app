name: Claude Code Review

# Sprint-merge gate: runs Claude over each PR's diff and fails the job only
# on a successfully completed review with CONFIRMED correctness bugs (not
# style/nits — those stay in local /code-review or /simplify runs).
# Requires an ANTHROPIC_API_KEY repository secret (Settings -> Secrets and
# variables -> Actions). Three distinct non-blocking outcomes are treated as
# warnings, never as a failing PR check:
#   1. the secret isn't configured;
#   2. the review step itself fails for an infrastructure/provider reason
#      (auth, billing, rate limit, timeout, action bug, ...) rather than
#      completing a review — see steps.claude_review.outcome below;
#   3. the review completed but produced no (or a malformed) result file.
# Only a review that completed successfully (steps.claude_review.outcome ==
# 'success') and reported blocking_findings > 0 fails the job.
#
# id-token: write is required for the Claude GitHub App's OIDC handshake —
# removing it reproduces an early failure mode of this workflow
# ("Could not fetch an OIDC token").

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
  code-review:
    runs-on: ubuntu-latest
    # Generous headroom above the one observed genuine review (18 of 25
    # available turns, ~5 minutes wall time including setup) — bounds a
    # hung run without risking cutting off a real, larger review.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude code review
        id: claude_review
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request's diff against its base branch:
            `git diff origin/${{ github.event.pull_request.base.ref }}...HEAD`

            Report CONFIRMED correctness bugs only — real defects you'd bet
            on, not style, not missing tests, not simplification ideas.
            Same bar as /code-review at medium effort.

            When done, write your findings as JSON to
            `code-review-result.json` at the repo root, with exactly this
            shape and nothing else in the file:
            {"blocking_findings": <count of CONFIRMED correctness bugs>, "summary": "<one paragraph, plain text>"}

            Do not modify any other file. Do not commit or push anything.
          claude_args: |
            --max-turns 25
            --allowedTools "Bash,Read,Grep,Glob,Write"

      - name: Warn if ANTHROPIC_API_KEY is missing
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: echo "::warning::ANTHROPIC_API_KEY secret not set — skipping automated code review. Add it under Settings > Secrets and variables > Actions to enable this gate."

      - name: Enforce gate
        if: always() && env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_OUTCOME: ${{ steps.claude_review.outcome }}
        run: |
          # Distinguish "the reviewer itself broke" (infra/provider failure —
          # auth, billing, rate limit, action bug) from "the reviewer ran and
          # found something". Only the latter can block the PR.
          if [ "$CLAUDE_OUTCOME" != "success" ]; then
            {
              echo "### Claude Code Review"
              echo "⚠️ The review did not complete (infrastructure/provider failure, not a code finding). This PR is not blocked by this gate — please review it manually. See the \"Run Claude code review\" step log for details."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Claude Code Review did not complete (infrastructure/provider issue, outcome=$CLAUDE_OUTCOME) — not treated as a blocking finding. Review this PR manually."
            exit 0
          fi

          if [ ! -f code-review-result.json ]; then
            echo "::warning::code-review-result.json was not produced — skipping gate, review this PR manually."
            exit 0
          fi

          if ! jq -e '
            (keys_unsorted | sort) == ["blocking_findings","summary"]
            and (.blocking_findings | type == "number" and floor == . and . >= 0)
            and (.summary | type == "string" and length > 0)
          ' code-review-result.json > /dev/null 2>&1; then
            echo "::warning::code-review-result.json has an unexpected shape — skipping gate, review this PR manually."
            exit 0
          fi

          BLOCKING=$(jq -r '.blocking_findings' code-review-result.json)
          SUMMARY=$(jq -r '.summary' code-review-result.json)
          {
            echo "### Claude Code Review"
            echo "$SUMMARY"
            echo ""
            echo "Blocking findings: $BLOCKING"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$BLOCKING" -gt 0 ]; then
            echo "::error::Claude found $BLOCKING blocking correctness issue(s) — see job summary."
            exit 1
          fi
