name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, Lint, Build, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Single runner (scripts/run-tests.mjs, Sprint 13.2) discovers and
      # executes every *.test.ts in the repo: domain/unit tests, the
      # architecture/domain-boundary guards (packages/bdos-core/src/architecture,
      # apps/web/architecture), and the XML/Excel import regression tests —
      # all in one command, no separate CI stage needed per category.
      - name: Test (unit, architecture guards, domain boundaries, XML/Excel regression)
        run: |
          set -o pipefail
          pnpm test | tee test-output.log

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          retention-days: 14
